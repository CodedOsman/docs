site_name: STEMAIDE Docs
site_description: Documentation for STEMAIDE, a platform for STEMAIDE Coder Manual.
site_author: STEMAIDE
site_dir: site
docs_dir: docs
theme:
  name: material
  custom_dir: overrides
  logo: assets/stemaide-logo-white-footer.128px.webp
  favicon: assets/favicon.ico
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  features:
  - navigation.instant
  - search.highlight
  - search.suggest
  - toc.integrate
  - navigation.footer
  - navigation.tabs
plugins:
- search
validation:
  nav:
    omitted_files: ignore
    not_found: ignore
    absolute_links: ignore
  links:
    not_found: ignore
    anchors: ignore
    absolute_links: ignore
    unrecognized_links: ignore
extra_css:
- stylesheets/extra.css
extra_javascript:
- javascripts/nav.js
extra:
  social:
  - icon: fontawesome/brands/instagram
    link: https://www.instagram.com/stemaideafrica
    name: Instagram
  - icon: fontawesome/brands/facebook
    link: https://www.facebook.com/stemaide
    name: Facebook
  - icon: fontawesome/brands/x-twitter
    link: https://twitter.com/stemaideafrica
    name: X (Twitter)
  - icon: fontawesome/brands/whatsapp
    link: https://www.whatsapp.com/channel/0029VaCyaNN5a23vbdCABI0n
    name: WhatsApp
  - icon: fontawesome/brands/youtube
    link: https://www.youtube.com/@STEMAIDEAfrica
    name: YouTube
  - icon: fontawesome/brands/tiktok
    link: https://www.tiktok.com/@stemaide
    name: TikTok
